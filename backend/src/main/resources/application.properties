# Server Configuration
server.port=8080

# MongoDB Configuration
spring.data.mongodb.uri=mongodb://localhost:27017/moviex
spring.data.mongodb.database=moviex

# Security Auto Config is now handled manually
# spring.autoconfigure.exclude=... (Removed)

# JWT Setup
moviex.app.jwtSecret=mySuperSecretKeyThatNeedsToBeLongEnoughForHS256ToWorkWhichMeansAtLeast256BitsOr32Characters
moviex.app.jwtExpirationMs=86400000

# Mail Configuration (Mock/Gmail) - using mock/log provider for testing locally
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=user
spring.mail.password=pass
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
